services:
  karakeep:
    image: ghcr.io/karakeep-app/karakeep:release
    ports:
      - "3001:3000"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      # headless Chrome 로 본문 크롤링/스크린샷. 없으면 plain http 로 떨어져
      # JS 렌더링·스냅샷이 빠지고 봇 차단 사이트는 crawlStatus: failure 가 난다.
      BROWSER_WEB_URL: http://chrome:9222
    restart: unless-stopped

  chrome:
    # 공식은 gcr.io/zenika-hub/alpine-chrome:124 지만 일부 망에서 gcr.io blob
    # 다운로드가 막혀, 동일 이미지의 Docker Hub 미러를 사용한다.
    image: zenika/alpine-chrome:124
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    restart: unless-stopped
